<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>html{background:#101014}</style>
  <title>Astrophotography — Jeremy Ivan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400&family=Space+Grotesk:wght@500&display=swap" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <!-- persistent home button — same control as every other page -->
  <a class="home-btn" href="/" aria-label="Home"><span class="glyph" aria-hidden="true">⌂</span> Home</a>

  <!-- Sky view: fixed planetarium (§5.6) -->
  <section class="astro" data-skyview>
    <div class="astro__bar">
      <span></span>
      <span class="boundary__name display">Astrophotography <span class="count" data-count></span></span>
      <span>
        <button class="btn" data-reset>Reset zoom</button>
        <button class="btn" data-toggle>Grid view</button>
      </span>
    </div>
    <div class="astro__sky" data-sky>
      <canvas class="astro__starcanvas" data-starcanvas aria-hidden="true"></canvas>
      <div class="astro__layer" data-layer></div>
    </div>
    <p class="astro__hint">Drag to look around · scroll to zoom · click a photograph to open it</p>
    <p class="astro__credit">Milky Way: <a href="https://svs.gsfc.nasa.gov/4851/" target="_blank" rel="noopener">NASA/GSFC SVS Deep Star Maps 2020</a></p>
    <div class="astro__detail" data-astro-detail></div>
  </section>

  <!-- Grid view: built lazily on first toggle, reuses the shared grid template -->
  <section data-gridview hidden>
    <div class="page">
      <div class="boundary boundary--top" data-boundary="top"></div>
      <header class="page__head" data-head>
        <h1 class="page__title display" data-title>Astrophotography</h1>
        <span style="display:flex;align-items:center;gap:0.9rem">
          <span class="count" data-count></span>
          <button class="btn" data-to-sky>↞ Sky map</button>
        </span>
      </header>
      <section class="grid" data-grid></section>
      <div class="boundary boundary--bottom" data-boundary="bottom"></div>
    </div>
  </section>

  <script type="module" src="/src/js/astro.js"></script>
</body>
</html>
