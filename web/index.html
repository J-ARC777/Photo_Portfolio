<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- paint charcoal on first frame (avoids a white flash on navigation) -->
  <style>html{background:#08080a}</style>
  <title>Jeremy Ivan — Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400&family=Space+Grotesk:wght@500&display=swap" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <main class="splash">
    <!-- ~80vh hero box. The starfield is LOCKED to this box (its child), not a
         free-floating viewport canvas: bounds + parallax frame track the hero. -->
    <section class="splash__hero" data-hero>
      <!-- back-to-front: photographic plate (LCP) → starfield (post-LCP) → UI (§5.1) -->
      <div class="splash__plate" data-plate aria-hidden="true"></div>
      <canvas class="splash__stars" data-stars aria-hidden="true"></canvas>
      <div class="splash__hero-ui">
        <div class="splash__identity">
          <h1 class="splash__name display">Jeremy Ivan Photography</h1>
          <p class="splash__tagline">Stellar cartography &amp; the world below it</p>
        </div>
        <a class="splash__cta" href="astro.html" data-astro-cta>
          Enter the sky map <span aria-hidden="true">→</span>
          <span class="count" data-astro-count></span>
        </a>
      </div>
    </section>

    <!-- ~20% peek sits below the fold, defeating the false bottom -->
    <nav class="categories" data-categories aria-label="Categories"></nav>
  </main>

  <script type="module" src="/src/js/splash.js"></script>
  <script type="module" src="/src/js/footer.js"></script>
</body>
</html>
